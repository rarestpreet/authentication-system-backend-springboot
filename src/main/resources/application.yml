spring:
  application:
    name: Authentication_system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    port: 587
    protocol: smtp
    host: smtp.gmail.com
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          from: ${MAIL_USER}
          starttls:
            enable: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

jwt:
  secret: ${SECRET_KEY}

springdoc:
  swagger-ui:
    path: /docs

server:
  servlet:
    context-path: /api/v1
  port: ${PORT:8080}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] [%X{requestMethod} %X{requestURI}] %-5level %logger - %msg%n"