spring:
  application:
    name: Authentication_system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    port: 587
    protocol: smtp
    host: smtp.gmail.com
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          from: ${MAIL_USER}
          starttls:
            enable: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

jwt:
  secret: ${SECRET_KEY}

server:
  servlet:
    context-path: /api

  port: ${PORT:8080}

