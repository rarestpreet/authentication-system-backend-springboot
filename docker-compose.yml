services:
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: passIs1234
      MYSQL_DATABASE: db
    ports:
      - "3307:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      retries: 10
      timeout: 5s

  spring:
    build: .
    container_name: spring
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - env/.env
    environment:
       MAIL_PASS: ${MAIL_PASS}
       MAIL_USER: ${MAIL_USER}
       SECRET_KEY: ${SECRET_KEY}
       SPRING_PROFILES_ACTIVE: docker
